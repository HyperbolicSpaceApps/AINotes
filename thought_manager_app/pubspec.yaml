name: thought_manager_app
description: "MVP: mobile-first note/task manager where an LLM agent is the primary interface. No folders, no manual sorting: just chat. Built for personal use with Groq's free tier."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  build_runner: ^2.4.13
  dependency_validator: ^4.1.3
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  hive_generator: ^2.0.0
  http: ^1.6.0
  shared_preferences: ^2.5.5
  speech_to_text: ^7.3.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
